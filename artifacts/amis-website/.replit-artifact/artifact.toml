kind = "web"
previewPath = "/"
title = "AMIS Farby Proszkowe"
version = "1.0.0"
id = "artifacts/amis-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21110

[services.development]
run = "pnpm --filter @workspace/amis-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/amis-website", "run", "build" ]
publicDir = "artifacts/amis-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21110"
BASE_PATH = "/"
